name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-stable
            os: ubuntu-latest
            toolchain: stable
          - name: ubuntu-msrv
            os: ubuntu-latest
            toolchain: 1.88.0
          - name: macos-stable
            os: macos-latest
            toolchain: stable
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      # Optional resource backends are feature-gated and off by default; compile, lint, and
      # unit-test them too. Their live integration tests are #[ignore]d (need a real service).
      - name: Lint (redis feature)
        run: cargo clippy -p limen --all-targets --features redis -- -D warnings
      - name: Test (redis feature)
        run: cargo test -p limen --features redis
